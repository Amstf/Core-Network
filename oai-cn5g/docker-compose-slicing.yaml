version: '3.8'
services:
    mysql:
        container_name: "mysql"
        image: mysql:8.0
        volumes:
            - ./database/oai_db.sql:/docker-entrypoint-initdb.d/oai_db.sql
            - ./healthscripts/mysql-healthcheck.sh:/tmp/mysql-healthcheck.sh
        environment:
            - TZ=Europe/Paris
            - MYSQL_DATABASE=oai_db
            - MYSQL_USER=test
            - MYSQL_PASSWORD=test
            - MYSQL_ROOT_PASSWORD=linux
        healthcheck:
            test: /bin/bash -c "/tmp/mysql-healthcheck.sh"
            interval: 10s
            timeout: 5s
            retries: 30
        networks:
            public_net:
                ipv4_address: 192.168.70.131
    oai-nrf:
        container_name: "oai-nrf"
        image: oaisoftwarealliance/oai-nrf:develop
        environment:
            - TZ=Europe/Paris
            - NRF_INTERFACE_NAME_FOR_SBI=eth0
        networks:
            public_net:
                ipv4_address: 192.168.70.130
    oai-udr:
        container_name: "oai-udr"
        image: oaisoftwarealliance/oai-udr:develop
        volumes:
            - ./conf/slicing/slicing_base_config.yaml:/openair-udr/etc/config.yaml
        depends_on:
            - mysql
            - oai-nrf
        networks:
            public_net:
                ipv4_address: 192.168.70.136
    oai-udm:
        container_name: "oai-udm"
        image: oaisoftwarealliance/oai-udm:develop
        volumes:
            - ./conf/slicing/slicing_base_config.yaml:/openair-udm/etc/config.yaml
        depends_on:
            - oai-udr
            - oai-nrf
        networks:
            public_net:
                ipv4_address: 192.168.70.137
    oai-ausf:
        container_name: "oai-ausf"
        image: oaisoftwarealliance/oai-ausf:develop
        volumes:
            - ./conf/slicing/slicing_base_config.yaml:/openair-ausf/etc/config.yaml
        depends_on:
            - oai-udm
            - oai-nrf
        networks:
            public_net:
                ipv4_address: 192.168.70.138
    oai-nssf:
        container_name: "oai-nssf"
        image: oaisoftwarealliance/oai-nssf:develop
        volumes:
            - ./conf/slicing/slicing_base_config.yaml:/openair-nssf/etc/config.yaml
            - ./conf/slicing/nssf_slice_config.yaml:/openair-nssf/etc/nssf_slice_config.yaml
        depends_on:
            - oai-nrf
        networks:
            public_net:
                ipv4_address: 192.168.70.139
    oai-amf:
        container_name: "oai-amf"
        image: oaisoftwarealliance/oai-amf:develop
        volumes:
            - ./conf/slicing/slicing_base_config.yaml:/openair-amf/etc/config.yaml
        depends_on:
            - oai-nrf
            - oai-nssf
            - oai-ausf
        networks:
            public_net:
                ipv4_address: 192.168.70.132
    oai-smf-slice1:
        container_name: "oai-smf-slice1"
        image: oaisoftwarealliance/oai-smf:develop
        volumes:
            - ./conf/slicing/slicing_slice1_config.yaml:/openair-smf/etc/config.yaml
        depends_on:
            - oai-amf
            - oai-nrf
        networks:
            public_net:
                ipv4_address: 192.168.70.133
    oai-smf-slice2:
        container_name: "oai-smf-slice2"
        image: oaisoftwarealliance/oai-smf:develop
        volumes:
            - ./conf/slicing/slicing_slice2_config.yaml:/openair-smf/etc/config.yaml
        depends_on:
            - oai-amf
            - oai-nrf
        networks:
            public_net:
                ipv4_address: 192.168.70.140
    oai-upf-slice1:
        container_name: "oai-upf-slice1"
        image: oaisoftwarealliance/oai-upf:develop
        volumes:
            - ./conf/slicing/slicing_slice1_config.yaml:/openair-upf/etc/config.yaml
        environment:
            - TZ=Europe/Paris
        depends_on:
            - oai-smf-slice1
            - oai-nrf
        cap_add:
            - NET_ADMIN
            - SYS_ADMIN
        privileged: true
        networks:
            public_net:
                ipv4_address: 192.168.70.134
    oai-upf-slice2:
        container_name: "oai-upf-slice2"
        image: oaisoftwarealliance/oai-upf:develop
        volumes:
            - ./conf/slicing/slicing_slice2_config.yaml:/openair-upf/etc/config.yaml
        environment:
            - TZ=Europe/Paris
        depends_on:
            - oai-smf-slice2
            - oai-nrf
        cap_add:
            - NET_ADMIN
            - SYS_ADMIN
        
        privileged: true
        networks:
            public_net:
                ipv4_address: 192.168.70.141
    oai-ext-dn:
        image: oaisoftwarealliance/trf-gen-cn5g:latest
        privileged: true
        container_name: oai-ext-dn
        volumes:
            - ./extdn-iperf-logs:/var/log/iperf
        entrypoint: /bin/bash -c "ip route add 12.1.1.0/24 via 192.168.70.134 dev eth0; ip route add 12.1.2.0/24 via 192.168.70.141 dev eth0; ip addr add 192.168.70.145 dev eth0; sleep infinity"
        depends_on:
            - oai-upf-slice1
            - oai-upf-slice2
        healthcheck:
            test: /bin/bash -c "ip r | grep 12.1.1.0"
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            public_net:
                ipv4_address: 192.168.70.135
networks:
    public_net:
        external: true
        name: demo-oai-public-net